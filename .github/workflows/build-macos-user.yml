name: Build macOS User Mode Emulation

on:
  push:
    branches:
      - master
      - 'claude/**'
      - 'copilot/**'
    paths:
      - 'macos-user/**'
      - 'common-user/**'
      - 'configs/targets/aarch64-macos-user.mak'
      - 'configure'
      - 'meson.build'
      - '.github/workflows/build-macos-user.yml'
      - 'tests/macos-user/**'
  pull_request:
    branches:
      - master
    paths:
      - 'macos-user/**'
      - 'common-user/**'
      - 'configs/targets/aarch64-macos-user.mak'
      - 'configure'
      - 'meson.build'
      - '.github/workflows/build-macos-user.yml'
      - 'tests/macos-user/**'
  workflow_dispatch:

jobs:
  build-macos-user:
    name: Build QEMU macOS User Mode (ARM64)
    runs-on: macos-14
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          # Install required packages
          brew install \
            meson \
            ninja \
            pkg-config \
            glib \
            pixman \
            libffi \
            libslirp \
            capstone \
            dtc \
            gettext \
            zlib \
            zstd

      - name: Display system information
        run: |
          echo "=== System Information ==="
          sw_vers
          uname -a
          echo ""
          echo "=== CPU Architecture ==="
          uname -m
          echo ""
          echo "=== Xcode Version ==="
          xcodebuild -version || echo "Xcode not found"
          echo ""
          echo "=== Clang Version ==="
          clang --version
          echo ""
          echo "=== Python Version ==="
          python3 --version
          echo ""
          echo "=== Meson Version ==="
          meson --version
          echo ""
          echo "=== Ninja Version ==="
          ninja --version

      - name: Cache QEMU build
        uses: actions/cache@v5
        with:
          path: |
            build
            ~/.cache/ccache
          key: qemu-build-${{ runner.os }}-${{ hashFiles('macos-user/**', 'configure', 'meson.build', 'configs/targets/aarch64-macos-user.mak') }}
          restore-keys: |
            qemu-build-${{ runner.os }}-

      - name: Configure QEMU
        run: |
          mkdir -p build
          cd build
          ../configure \
            --target-list=aarch64-macos-user \
            --disable-system \
            --disable-bsd-user \
            --disable-linux-user \
            --enable-tcg \
            --enable-debug-info \
            --python=python3

      - name: Display configuration
        run: |
          echo "=== Build Configuration ==="
          cat build/config-host.mak | grep -E "TARGET_|CONFIG_" | head -30
          echo ""
          echo "=== Configured targets ==="
          cat build/config-host.mak | grep TARGET_DIRS

      - name: Build QEMU macOS user mode
        run: |
          cd build
          make -j$(sysctl -n hw.ncpu) V=1

      - name: Verify binary
        run: |
          echo "=== Checking for qemu-aarch64 binary ==="
          ls -lh build/qemu-aarch64* || echo "Binary not found at expected location"
          find build -name "qemu-aarch64*" -type f
          echo ""
          echo "=== File information ==="
          file build/qemu-aarch64 2>/dev/null || echo "Cannot read binary"
          echo ""
          echo "=== Binary size ==="
          du -h build/qemu-aarch64 2>/dev/null || echo "Cannot get size"
          echo ""
          echo "=== Testing binary execution ==="
          build/qemu-aarch64 --version 2>/dev/null || echo "Binary cannot execute or --version not supported"

      - name: Run basic tests
        run: |
          echo "=== Running basic sanity tests ==="
          # Test help output
          build/qemu-aarch64 -h > /tmp/help.txt 2>&1 || echo "Help command failed"
          if [ -s /tmp/help.txt ]; then
            echo "Help output generated successfully"
            head -20 /tmp/help.txt
          else
            echo "Warning: Help output is empty"
          fi

      - name: Test macOS CLI tools under emulation
        run: |
          echo "=== Running macOS CLI tool comparison tests ==="
          python3 tests/macos-user/test_cli_tools.py

      - name: Create build summary
        run: |
          echo "# macOS User Mode Emulation Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner OS**: macOS $(sw_vers -productVersion)" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Binary Information" >> $GITHUB_STEP_SUMMARY
          if [ -f build/qemu-aarch64 ]; then
            echo "- **Binary**: qemu-aarch64" >> $GITHUB_STEP_SUMMARY
            echo "- **Size**: $(du -h build/qemu-aarch64 | cut -f1)" >> $GITHUB_STEP_SUMMARY
            echo "- **Type**: $(file build/qemu-aarch64 | cut -d: -f2)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Build successful!" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Build failed - binary not found" >> $GITHUB_STEP_SUMMARY
          fi
