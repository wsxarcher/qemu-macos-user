name: Build macOS User Mode Emulation

on:
  push:
    branches:
      - master
      - 'claude/**'
      - 'copilot/**'
    paths:
      - 'macos-user/**'
      - 'common-user/**'
      - 'configs/targets/aarch64-macos-user.mak'
      - 'configure'
      - 'meson.build'
      - '.github/workflows/build-macos-user.yml'
      - 'tests/macos-user/**'
  pull_request:
    branches:
      - master
    paths:
      - 'macos-user/**'
      - 'common-user/**'
      - 'configs/targets/aarch64-macos-user.mak'
      - 'configure'
      - 'meson.build'
      - '.github/workflows/build-macos-user.yml'
      - 'tests/macos-user/**'
  workflow_dispatch:

jobs:
  build-macos-user:
    name: Build QEMU macOS User Mode (ARM64)
    runs-on: macos-14
    env:
      PATH: /opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          # Install required packages
          brew install \
            meson \
            ninja \
            pkg-config \
            glib \
            pixman \
            libffi \
            libslirp \
            capstone \
            dtc \
            gettext \
            zlib \
            zstd

      - name: Display system information
        run: |
          echo "=== System Information ==="
          sw_vers
          uname -a
          echo ""
          echo "=== CPU Architecture ==="
          uname -m
          echo ""
          echo "=== Xcode Version ==="
          xcodebuild -version || echo "Xcode not found"
          echo ""
          echo "=== Clang Version ==="
          clang --version
          echo ""
          echo "=== Python Version ==="
          python3 --version
          echo ""
          echo "=== Meson Version ==="
          meson --version
          echo ""
          echo "=== Ninja Version ==="
          ninja --version

      - name: Cache QEMU build
        uses: actions/cache@v5
        with:
          path: |
            build
            ~/.cache/ccache
          key: qemu-build-${{ runner.os }}-${{ hashFiles('macos-user/**', 'configure', 'meson.build', 'configs/targets/aarch64-macos-user.mak') }}
          restore-keys: |
            qemu-build-${{ runner.os }}-

      - name: Configure QEMU
        run: |
          mkdir -p build
          cd build
          ../configure \
            --target-list=aarch64-macos-user \
            --disable-system \
            --disable-bsd-user \
            --disable-linux-user \
            --enable-tcg \
            --enable-debug-info \
            --python=python3

      - name: Display configuration
        run: |
          echo "=== Build Configuration ==="
          cat build/config-host.mak | grep -E "TARGET_|CONFIG_" | head -30
          echo ""
          echo "=== Configured targets ==="
          cat build/config-host.mak | grep TARGET_DIRS

      - name: Build QEMU macOS user mode
        run: |
          cd build
          make -j$(sysctl -n hw.ncpu) V=1
          # Explicitly build the signed binary with JIT entitlements
          ninja qemu-aarch64 || true

      - name: Resolve QEMU binary
        id: resolve-binary
        run: |
          # The meson build produces qemu-aarch64-unsigned on macOS.
          # The entitlement.sh custom_target should rename it to qemu-aarch64,
          # but this may not happen if Rez/SetFile tools are unavailable.
          # Use whichever binary exists.
          if [ -f build/qemu-aarch64 ]; then
            QEMU_BIN="$(pwd)/build/qemu-aarch64"
          elif [ -f build/qemu-aarch64-unsigned ]; then
            QEMU_BIN="$(pwd)/build/qemu-aarch64-unsigned"
          else
            echo "ERROR: No QEMU binary found in build/"
            find build -maxdepth 1 -name "qemu-*" -type f
            exit 1
          fi
          echo "QEMU_BIN=${QEMU_BIN}" >> "$GITHUB_ENV"
          echo "qemu_bin=${QEMU_BIN}" >> "$GITHUB_OUTPUT"
          echo "Resolved QEMU binary: ${QEMU_BIN}"

      - name: Verify binary
        run: |
          echo "=== Checking QEMU binary ==="
          ls -lh "$QEMU_BIN"
          echo ""
          echo "=== File information ==="
          file "$QEMU_BIN"
          echo ""
          echo "=== Binary size ==="
          du -h "$QEMU_BIN"

      - name: Run basic tests
        run: |
          echo "=== Running basic sanity tests ==="
          # Test help output
          "$QEMU_BIN" -h > /tmp/help.txt 2>&1 || echo "Help command failed"
          if [ -s /tmp/help.txt ]; then
            echo "Help output generated successfully"
            head -20 /tmp/help.txt
          else
            echo "Warning: Help output is empty"
          fi

      - name: Test macOS CLI tools under emulation
        env:
          QEMU_MACOS_USER: ${{ steps.resolve-binary.outputs.qemu_bin }}
        run: |
          echo "=== Running macOS CLI tool comparison tests ==="
          echo "Using binary: ${QEMU_MACOS_USER}"
          python3 tests/macos-user/test_cli_tools.py

      - name: Create build summary
        run: |
          echo "# macOS User Mode Emulation Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner OS**: macOS $(sw_vers -productVersion)" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Binary Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Binary**: $(basename "$QEMU_BIN")" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $(du -h "$QEMU_BIN" | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: $(file "$QEMU_BIN" | cut -d: -f2)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Build successful!" >> $GITHUB_STEP_SUMMARY
